active_model = "devstral-2"
vim_keybindings = false
disable_welcome_banner_animation = false
autocopy_to_clipboard = true
file_watcher_for_autocomplete = false
displayed_workdir = ""
context_warnings = false
voice_mode_enabled = false
narrator_enabled = false
active_transcribe_model = "voxtral-realtime"
active_tts_model = "voxtral-tts"
auto_approve = false
enable_telemetry = true
system_prompt_id = "cli"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = true
enable_auto_update = true
enable_notifications = true
api_timeout = 720.0
auto_compact_threshold = 200000
tool_paths = []
enabled_tools = []
disabled_tools = ["web_search"]
agent_paths = []
enabled_agents = []
disabled_agents = []
installed_agents = []
skill_paths = []
enabled_skills = []
disabled_skills = []

[[mcp_servers]]
name = "exa"
transport = "http"
url = "https://mcp.exa.ai/mcp"

[tools.exa_web_search_exa]
permission = "always"

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "openai"
backend = "mistral"
reasoning_field_name = "reasoning_content"
project_id = ""
region = ""

[[providers]]
name = "llamacpp"
api_base = "http://127.0.0.1:8080/v1"
api_key_env_var = ""
api_style = "openai"
backend = "generic"
reasoning_field_name = "reasoning_content"
project_id = ""
region = ""

[[models]]
name = "devstral-2512"
provider = "mistral"
alias = "devstral-2"
temperature = 0.2
input_price = 0.4
output_price = 2.0
thinking = "off"
auto_compact_threshold = 200000

[[models]]
name = "devstral-small-latest"
provider = "mistral"
alias = "devstral-small"
temperature = 0.2
input_price = 0.1
output_price = 0.3
thinking = "off"
auto_compact_threshold = 200000

[[models]]
name = "devstral"
provider = "llamacpp"
alias = "local"
temperature = 0.2
input_price = 0.0
output_price = 0.0
thinking = "off"
auto_compact_threshold = 200000

[[transcribe_providers]]
name = "mistral"
api_base = "wss://api.mistral.ai"
api_key_env_var = "MISTRAL_API_KEY"
client = "mistral"

[[transcribe_models]]
name = "voxtral-mini-transcribe-realtime-2602"
provider = "mistral"
alias = "voxtral-realtime"
sample_rate = 16000
encoding = "pcm_s16le"
language = "en"
target_streaming_delay_ms = 500

[[tts_providers]]
name = "mistral"
api_base = "https://api.mistral.ai"
api_key_env_var = "MISTRAL_API_KEY"
client = "mistral"

[[tts_models]]
name = "voxtral-mini-tts-latest"
provider = "mistral"
alias = "voxtral-tts"
voice = "gb_jane_neutral"
response_format = "wav"

[project_context]
default_commit_count = 5
timeout_seconds = 2.0

[session_logging]
save_dir = "~/.vibe/logs/session"
session_prefix = "session"
enabled = true

[tools.skill]
permission = "ask"
allowlist = []
denylist = []
sensitive_patterns = []

[tools.grep]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_output_bytes = 64000
default_max_matches = 100
default_timeout = 60
exclude_patterns = [
    ".venv/",
    "venv/",
    ".env/",
    "env/",
    "node_modules/",
    ".git/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".tox/",
    ".nox/",
    ".coverage/",
    "htmlcov/",
    "dist/",
    "build/",
    ".idea/",
    ".vscode/",
    "*.egg-info",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    ".DS_Store",
    "Thumbs.db",
]
codeignore_file = ".vibeignore"

[tools.exit_plan_mode]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []

[tools.search_replace]
permission = "ask"
allowlist = []
denylist = []
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_content_size = 100000
create_backup = false
fuzzy_threshold = 0.9

[tools.bash]
permission = "ask"
allowlist = [
    "cd",
    "echo",
    "git diff",
    "git log",
    "git status",
    "tree",
    "whoami",
    "cat",
    "file",
    "head",
    "ls",
    "pwd",
    "stat",
    "tail",
    "uname",
    "wc",
    "which",
]
denylist = [
    "gdb",
    "pdb",
    "passwd",
    "nano",
    "vim",
    "vi",
    "emacs",
    "bash -i",
    "sh -i",
    "zsh -i",
    "fish -i",
    "dash -i",
    "screen",
    "tmux",
]
sensitive_patterns = [
    "sudo",
]
max_output_bytes = 16000
default_timeout = 300
denylist_standalone = [
    "python",
    "python3",
    "ipython",
    "bash",
    "sh",
    "nohup",
    "vi",
    "vim",
    "emacs",
    "nano",
    "su",
]

[tools.web_fetch]
permission = "ask"
allowlist = []
denylist = []
sensitive_patterns = []
default_timeout = 30
max_timeout = 120
max_content_bytes = 512000
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

[tools.read_file]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_read_bytes = 64000

[tools.task]
permission = "ask"
allowlist = [
    "explore",
]
denylist = []
sensitive_patterns = []

[tools.todo]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []
max_todos = 100

[tools.write_file]
permission = "ask"
allowlist = []
denylist = []
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_write_bytes = 64000
create_parent_dirs = true

[tools.ask_user_question]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []
